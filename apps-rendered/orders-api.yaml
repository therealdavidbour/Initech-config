---
# Source: apps/templates/orders-api.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-api-main
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/initech-ai/Initech-config.git
    targetRevision: main
    path: services/orders-api/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
