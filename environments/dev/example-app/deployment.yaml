apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
        - name: example-app
          image: nginx:alpine
          ports:
            - containerPort: 80
