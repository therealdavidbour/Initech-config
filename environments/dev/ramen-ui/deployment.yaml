apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramen-ui
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ramen-ui
  template:
    metadata:
      labels:
        app: ramen-ui
    spec:
      containers:
        - name: ramen-ui
          image: ghcr.io/therealdavidbour/ramen-ui:51eeb4f9ea2b2882ecb20d2d5e84b4dd03f52380
          ports:
            - containerPort: 80
