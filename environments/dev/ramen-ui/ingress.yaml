apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ramen-ui
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
    - host: ramen-ui.10-0-0-200.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ramen-ui
                port:
                  number: 80
